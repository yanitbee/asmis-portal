<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details | ASMIS</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #0d0a08 0%, #1a1410 30%, #120e0c 60%, #0a0806 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        /* African border top decoration */
        body::before {
            content: '';
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            height: 30px;
            background:
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 10px,
                    rgba(194, 153, 88, 0.3) 10px,
                    rgba(194, 153, 88, 0.3) 12px,
                    transparent 12px,
                    transparent 20px,
                    rgba(194, 153, 88, 0.15) 20px,
                    rgba(194, 153, 88, 0.15) 25px,
                    transparent 25px,
                    transparent 30px);
            opacity: 0.6;
            z-index: 0;
        }

        /* Navbar overrides */
        .nav-group a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-group a:hover {
            color: var(--primary);
        }

        .details-wrapper {
            max-width: 900px;
            margin: 4rem auto;
            position: relative;
            z-index: 1;
            padding: 0 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: transform 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }
        
        .back-link svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            fill: currentColor;
        }

        .details-card {
            background:
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(194, 153, 88, 0.01) 30px, rgba(194, 153, 88, 0.01) 32px),
                linear-gradient(180deg, #1e1914, #1a1612);
            border: 1px solid rgba(194, 153, 88, 0.25);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .details-card {
                grid-template-columns: 1fr;
                text-align: center;
            }
        }

        /* Speaker-style photo */
        .speaker-card {
            background: linear-gradient(180deg, #1a1612, #120e0c);
            border: 1px solid rgba(194, 153, 88, 0.15);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 250px;
            justify-content: center;
        }
        .speaker-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }
        .speaker-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            padding: 6px;
            background: linear-gradient(135deg, var(--primary), #8a6b3a);
            position: relative;
        }
        .speaker-img img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1a1612;
            background: #2a231c; /* Fallback color for missing image */
        }

        .user-status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        .status-pending { background: rgba(141, 110, 99, 0.15); color: var(--accent); border: 1px solid rgba(141, 110, 99, 0.3); }
        .status-approved { background: rgba(232, 220, 196, 0.15); color: var(--parchment); border: 1px solid rgba(232, 220, 196, 0.3); }
        .status-rejected { background: rgba(93, 64, 55, 0.25); color: #d4a95a; border: 1px solid rgba(93, 64, 55, 0.3); }
        
        .info-section h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .info-section .subtitle {
            color: #777;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        .info-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(194, 153, 88, 0.1);
        }

        .info-item label {
            display: block;
            color: var(--primary);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .info-item .value {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
        }

        /* Action Buttons */
        .actions-bar {
            display: flex;
            gap: 15px;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px dashed rgba(194, 153, 88, 0.2);
        }

        .btn {
            padding: 14px 24px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }
        .btn-approve {
            background: linear-gradient(180deg, #d4a95a 0%, #c29958 100%);
            color: #120e0c;
            box-shadow: 0 4px 0 #7a5c2e, 0 6px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #7a5c2e, 0 8px 14px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn-approve:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a5c2e;
        }

        .btn-reject {
            background: linear-gradient(180deg, #5d4037 0%, #3d2a24 100%);
            color: var(--parchment);
            box-shadow: 0 4px 0 #2a1d19, 0 6px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2a1d19, 0 8px 14px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn-reject:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2a1d19;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            filter: grayscale(1);
        }
        
        #loadingMsg {
            color: var(--primary);
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header style="position: relative; z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);">
        <!-- Tribal Divider Top -->
        <div style="height: 4px; background: repeating-linear-gradient(90deg, var(--primary) 0px, var(--primary) 40px, #000 40px, #000 80px); opacity: 0.6;"></div>
        <div class="header-main" style="display: flex; align-items: center; justify-content: space-between; padding: 4px 40px;">
            <!-- Logo Left -->
            <a href="../index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                <img src="../assets/asmis_logo_official.png" alt="ASMIS Logo" style="height: 60px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));">
            </a>
            <!-- Right Nav -->
            <div class="nav-group" style="gap: 18px; font-size: 0.85rem; justify-content: flex-end; align-items: center; display: flex;">
                <a href="dashboard.html" id="dashLink">DASHBOARD</a>
                <span style="color: #666;">|</span>
                 <a href="#" onclick="logout()">LOG OUT</a>
            </div>
        </div>
        <div class="header-bottom-border" style="height: 1px; background: rgba(194, 153, 88, 0.2);"></div>
    </header>

    <div class="details-wrapper">
        <a href="#" id="backBtn" class="back-link">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
            Back to Dashboard
        </a>

        <div id="loadingMsg">Loading User Details...</div>

        <div id="detailsCard" class="details-card hidden">
            <!-- Photo Section -->
            <div class="speaker-card">
                <div class="speaker-img">
                    <!-- Default to a placeholder generic avatar, could be replaced with actual user photo if available -->
                    <img id="userPhoto" src="https://ui-avatars.com/api/?name=User&background=c29958&color=fff&size=140" alt="User Photo">
                </div>
                <h3 id="photoName" style="color: #fff; margin: 10px 0 0; font-size: 1.2rem;">User Name</h3>
                <p id="photoRole" style="color: var(--primary); font-size: 0.8rem; margin: 5px 0 0; text-transform: uppercase; letter-spacing: 1px;">Role</p>
                <span id="photoStatus" class="user-status-badge status-pending">Pending</span>
            </div>

            <!-- Details Section -->
            <div class="info-section">
                <h2 id="userNameTitle">User Information</h2>
                <p class="subtitle" id="userListType">Applicant Details</p>

                <div class="info-grid">
                    <div class="info-item">
                        <label>ID</label>
                        <div class="value" id="valId">-</div>
                    </div>
                    <div class="info-item">
                        <label>Email</label>
                        <div class="value" id="valEmail">-</div>
                    </div>
                    <div class="info-item">
                        <label>Role / Type</label>
                        <div class="value" id="valRole">-</div>
                    </div>
                    <div class="info-item" id="countryContainer">
                        <label>Country</label>
                        <div class="value" id="valCountry">-</div>
                    </div>
                    <div class="info-item" id="dateContainer">
                        <label>Date Added / Created</label>
                        <div class="value" id="valDate">-</div>
                    </div>
                     <div class="info-item" id="qrContainer" style="display: none;">
                        <label>QR Code</label>
                        <div class="value"><a href="#" id="valQrLink" style="color: var(--primary); text-decoration: none;">Download QR</a></div>
                    </div>
                </div>

                <div class="actions-bar" id="actionButtons">
                    <button class="btn btn-approve" id="approveBtn" onclick="handleAction('approve')">Approve</button>
                    <button class="btn btn-reject" id="rejectBtn" onclick="handleAction('reject')">Reject / Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="user-details.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
